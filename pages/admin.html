<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <title>OrdSys-Admin</title>
</head>


<body>
    <h1>Admin Page</h1>
    <a href="../index.html">Home</a>
    <br />
    <label for="login">Logged in as: </label>
    <select name="login" id="login">
        <option value="">SELECT USER</option>
    </select>
    <br />
    <a href="users.html">Manage Users</a>
    <br />

    <div class="mode-select">
        <label for="triageDropdown">Triage Mode: </label>
        <select name="triageDropdown" id="triageDropdown">
            <option value="PRIORITY">Priority First</option>
            <option value="OLDEST">Oldest</option>
            <option value="NEWEST">Newest</option>
        </select>
        <button id="triageButton">Select</button>
    </div>
    
    <div class="order-lists" style="max-width: 60%; height: 750px;">
        <div class="sub-list">
            <h3>All Orders</h3>
            <ul id="allOrders" style="height: 750px;">
                <li style="text-align: center; list-style-type: none;">Waiting for response...</li>
            </ul>
        </div>
        <div class="sub-list">
            <h3>Logs</h3>
            <ul id="logsList" style="height: 750px;">
                <li style="text-align: center; list-style-type: none;">Waiting for response...</li>
            </ul>
        </div>
    </div>

    <script type="module" src="../js/admin.js" defer></script>
</body>
</html>
